name: Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.1.2)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Error: tag must start with 'v'. Current tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "Publishing version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Pack and publish via Nuke
        shell: bash
        run: |
          set -o pipefail
          dotnet run --project "build/_build.csproj" -- --target Publish --configuration Release --version "${{ env.VERSION }}" --nuget-api-key "${{ secrets.NUGET_API_KEY }}" 2>&1 | tee publish.log
      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-publish-log
          path: ./publish.log
          if-no-files-found: warn
      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: Prism.SourceGenerators.Package/bin/Release/*.nupkg
          if-no-files-found: warn
      - name: Write publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NuGet Publish Summary"
            echo ""
            echo "- Version: \`${VERSION:-unknown}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Actor: \`${GITHUB_ACTOR}\`"
            echo "- Job status: \`${{ job.status }}\`"
            echo ""
            echo "### Artifacts"
            echo "- \`nuget-publish-log\` (full publish output)"
            echo "- \`nuget-packages\` (generated .nupkg files, if any)"
          } >> "$GITHUB_STEP_SUMMARY"
