name: Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.1.2)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Error: tag must start with 'v'. Current tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "Publishing version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Pack and publish via Nuke
        run: dotnet run --project "build/_build.csproj" -- --target Publish --configuration Release --version "${{ env.VERSION }}" --nuget-api-key "${{ secrets.NUGET_API_KEY }}"
