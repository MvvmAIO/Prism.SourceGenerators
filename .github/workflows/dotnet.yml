# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - ".github/badges/tests.json"
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json', '**/global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Run CI targets via Nuke
      run: dotnet run --project "build/_build.csproj" -- --target Ci --configuration Release
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults/**/*.trx
    - name: Generate test badge payload
      if: always()
      shell: pwsh
      run: |
        $trxFiles = Get-ChildItem -Path "./TestResults" -Filter "*.trx" -Recurse -ErrorAction SilentlyContinue
        $total = 0
        $passed = 0
        $failed = 0
        $skipped = 0

        foreach ($file in $trxFiles) {
          [xml]$trx = Get-Content $file.FullName
          $counters = $trx.TestRun.ResultSummary.Counters
          if ($null -ne $counters) {
            $total += [int]$counters.total
            $passed += [int]$counters.passed
            $failed += [int]$counters.failed
            $skipped += [int]$counters.notExecuted
          }
        }

        if ($failed -gt 0) {
          $color = "red"
        } elseif ($skipped -gt 0) {
          $color = "yellow"
        } else {
          $color = "brightgreen"
        }

        $message = "$passed passed | $failed failed | $skipped skipped"
        $payload = @{
          schemaVersion = 1
          label = "tests"
          message = $message
          color = $color
        } | ConvertTo-Json -Compress

        New-Item -ItemType Directory -Path ".github/badges" -Force | Out-Null
        Set-Content -Path ".github/badges/tests.json" -Value $payload

    - name: Commit test badge payload
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore(ci): update test badge payload [skip ci]"
        file_pattern: .github/badges/tests.json
